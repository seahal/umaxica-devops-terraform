name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - stacks/stg/aws/ap-northeast-1/app
          - stacks/stg/aws/ap-northeast-1/state-backend
          - stacks/stg/cloudflare
          - stacks/stg/gcp/asia-northeast1/identity
          - stacks/stg/vercel
          - stacks/prod/aws/ap-northeast-1/app
          - stacks/prod/cloudflare
          - stacks/prod/gcp/asia-northeast1/identity
          - stacks/prod/vercel
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        working-directory: ${{ matrix.stack }}
        run: terraform init -backend=false -input=false
      - name: Terraform Validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate -no-color
