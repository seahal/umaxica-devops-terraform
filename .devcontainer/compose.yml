name: terraform

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        DOCKER_UID: ${UID:-1000}
        DOCKER_GID: ${GID:-1000}
        DOCKER_USER: devcontainer
        DOCKER_GROUP: devcontainer
        TERRAFORM_VERSION: 1.11.2
        TFLINT_VERSION: 0.53.0
        TERRAFORM_DOCS_VERSION: 0.19.0
        NODE_MAJOR: 22
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    tty: true
    stdin_open: true
    command: sleep infinity
    environment:
      TF_IN_AUTOMATION: "1"
      TF_PLUGIN_CACHE_DIR: /home/devcontainer/.terraform.d/plugin-cache
      AWS_PAGER: ""
      CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        consistency: cached
      - type: bind
        source: ${HOME}/.gitconfig
        target: /home/devcontainer/.gitconfig
        read_only: true
      - type: bind
        source: ${HOME}/.ssh
        target: /home/devcontainer/.ssh
        read_only: true
      - type: bind
        source: ${HOME}/.aws
        target: /home/devcontainer/.aws
        read_only: true
      - type: bind
        source: ${HOME}/.config/gcloud
        target: /home/devcontainer/.config/gcloud
        read_only: true
      - type: volume
        source: terraform-cache
        target: /home/devcontainer/.terraform.d/plugin-cache
        volume:
          nocopy: true

volumes:
  terraform-cache:
